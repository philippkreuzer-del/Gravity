<style>
/* ─── RESET & BASE ─── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{
  --bg:#08090d;--surface:#0f1117;--card:#141620;--card-hover:#191c2a;
  --border:rgba(255,255,255,0.04);--border-light:rgba(255,255,255,0.08);
  --text:#f0eeeb;--text-secondary:#8a8997;--text-tertiary:#55546a;
  --accent:#00e5a0;--accent-dim:rgba(0,229,160,0.08);--accent-mid:rgba(0,229,160,0.15);
  --accent2:#4d7cfe;--accent2-dim:rgba(77,124,254,0.08);
  --warn:#ff7a45;--warn-dim:rgba(255,122,69,0.08);
  --success:#34d399;--success-dim:rgba(52,211,153,0.08);
  --danger:#f87171;
  --glass:rgba(20,22,32,0.7);--glass-border:rgba(255,255,255,0.06);
  --radius:16px;--radius-sm:10px;--radius-xs:8px;
  --shadow:0 4px 24px rgba(0,0,0,0.4),0 1px 2px rgba(0,0,0,0.3);
  --shadow-glow:0 0 40px rgba(0,229,160,0.08);
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  --font:'Plus Jakarta Sans',system-ui,sans-serif;--font-display:'Bebas Neue',sans-serif;
}
html{background:var(--bg)}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;position:relative}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}

/* ─── AMBIENT BACKGROUND ─── */
.ambient{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;overflow:hidden}
.ambient::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;top:-200px;right:-200px;background:radial-gradient(circle,rgba(0,229,160,0.04) 0%,transparent 70%);animation:ambientFloat 20s ease-in-out infinite}
.ambient::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;bottom:-150px;left:-150px;background:radial-gradient(circle,rgba(77,124,254,0.03) 0%,transparent 70%);animation:ambientFloat 25s ease-in-out infinite reverse}
@keyframes ambientFloat{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,20px) scale(1.1)}}

/* ─── NOISE TEXTURE ─── */
.noise{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:1;opacity:0.025;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* ─── APP SHELL ─── */
.app{max-width:430px;margin:0 auto;position:relative;z-index:2;min-height:100vh;min-height:100dvh}
.page{padding-bottom:100px;opacity:0;animation:pageIn 0.4s ease-out 0.05s forwards}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.header{padding:calc(24px + var(--safe-top)) 20px 16px}
.body{padding:0 20px}

/* ─── LOGO ─── */
.logo{font-family:var(--font-display);font-size:32px;letter-spacing:0.12em;background:linear-gradient(135deg,var(--accent) 0%,#4dffc3 40%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.logo-sub{font-size:11px;font-weight:600;color:var(--text-tertiary);letter-spacing:0.15em;text-transform:uppercase;margin-top:2px}

/* ─── WEEK INDICATOR ─── */
.week-dots{display:flex;gap:6px;align-items:center}
.week-dot{width:8px;height:8px;border-radius:50%;background:var(--border-light);transition:all 0.3s}
.week-dot.filled{background:var(--accent);box-shadow:0 0 8px rgba(0,229,160,0.4)}
.week-dot.current{border:2px solid var(--accent);background:transparent;width:10px;height:10px}

/* ─── CARDS ─── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:10px;position:relative;overflow:hidden;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);cursor:pointer}
.card:active{transform:scale(0.98);background:var(--card-hover)}
.card.glow{border-color:rgba(0,229,160,0.12)}
.card.glow::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,229,160,0.3),transparent)}

/* ─── PROGRESS RING ─── */
.ring-wrap{position:relative;width:48px;height:48px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border-light);stroke-width:3}
.ring-fill{fill:none;stroke:url(#ringGrad);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1)}
.ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--accent)}
.ring-text.done{color:var(--success)}

/* ─── SECTION LABELS ─── */
.section{display:flex;align-items:center;gap:8px;margin:24px 0 12px}
.section-line{flex:1;height:1px;background:var(--border)}
.section-text{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:var(--text-tertiary);white-space:nowrap}

/* ─── EXERCISE ROWS ─── */
.ex{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden;transition:all 0.25s}
.ex.done{border-color:rgba(52,211,153,0.15);background:rgba(52,211,153,0.02)}
.ex-header{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.ex-num{width:28px;height:28px;border-radius:50%;background:var(--accent-dim);color:var(--accent);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.ex.done .ex-num{background:var(--success-dim);color:var(--success)}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:13px;font-weight:700;line-height:1.3}
.ex.done .ex-name{color:var(--success)}
.ex-detail{font-size:11px;color:var(--text-secondary);margin-top:2px}
.ex-skill-tag{font-size:9px;font-weight:700;color:var(--accent);background:var(--accent-dim);padding:2px 8px;border-radius:20px;display:inline-block;margin-top:4px}
.chevron{color:var(--text-tertiary);font-size:14px;transition:transform 0.3s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}

/* ─── EXERCISE EXPANDED ─── */
.ex-body{padding:0 16px 16px;border-top:1px solid var(--border)}
.ex-body .tip{font-size:11px;padding:10px 12px;border-radius:var(--radius-xs);margin-top:12px;line-height:1.5}
.tip.note{color:var(--warn);background:var(--warn-dim);border:1px solid rgba(255,122,69,0.1)}
.tip.coach{color:var(--accent2);background:var(--accent2-dim);border:1px solid rgba(77,124,254,0.1)}

/* ─── SET CIRCLES ─── */
.sets{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.set{width:38px;height:38px;border-radius:50%;border:2px solid var(--border-light);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text-tertiary);cursor:pointer;transition:all 0.2s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden}
.set::before{content:'';position:absolute;inset:0;border-radius:50%;background:var(--accent);transform:scale(0);transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);z-index:0}
.set.done{border-color:var(--accent);color:var(--bg)}
.set.done::before{transform:scale(1)}
.set span{position:relative;z-index:1}

/* ─── ACTION BUTTONS ─── */
.actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.btn{font-family:var(--font);border:none;border-radius:var(--radius-xs);padding:9px 14px;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px}
.btn:active{transform:scale(0.95)}
.btn-ghost{background:var(--surface);color:var(--text-secondary);border:1px solid var(--border-light)}
.btn-ghost:active{background:var(--card-hover)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#00c98e);color:var(--bg);box-shadow:0 2px 12px rgba(0,229,160,0.2)}
.btn-primary:active{box-shadow:0 1px 6px rgba(0,229,160,0.15)}
.btn-danger{background:transparent;color:var(--danger);border:1px solid rgba(248,113,113,0.15)}
.btn-full{width:100%;justify-content:center;padding:14px;font-size:13px;margin-top:16px}

/* ─── INPUT ─── */
.input{font-family:var(--font);background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius-xs);padding:10px 14px;color:var(--text);font-size:13px;width:100%;outline:none;transition:border-color 0.2s}
.input:focus{border-color:rgba(0,229,160,0.3)}
.input-row{display:flex;gap:8px;margin-top:10px}

/* ─── LOG ENTRIES ─── */
.log-entry{font-size:10px;margin-top:8px;padding:6px 10px;border-radius:var(--radius-xs);display:flex;align-items:center;gap:6px}
.log-entry.hold{color:var(--accent);background:var(--accent-dim)}
.log-entry.rep{color:var(--accent2);background:var(--accent2-dim)}

/* ─── SKILL CARDS ─── */
.skill-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:10px;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden}
.skill-card:active{transform:scale(0.98);background:var(--card-hover)}
.skill-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transform:scaleX(var(--prog,0));transform-origin:left;transition:transform 0.6s cubic-bezier(0.4,0,0.2,1)}

/* ─── LEVEL PROGRESSION ─── */
.levels{display:flex;align-items:center;gap:4px;margin:20px 0}
.lvl{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;transition:all 0.3s}
.lvl.past{background:var(--success-dim);color:var(--success);border:2px solid rgba(52,211,153,0.2)}
.lvl.now{background:var(--accent-dim);color:var(--accent);border:2px solid rgba(0,229,160,0.3);box-shadow:0 0 12px rgba(0,229,160,0.15)}
.lvl.future{background:var(--surface);color:var(--text-tertiary);border:2px solid var(--border)}
.lvl-line{flex:1;height:2px;border-radius:1px;transition:background 0.3s}
.lvl-line.past{background:var(--success)}
.lvl-line.next{background:var(--border-light)}

/* ─── STAT CARDS ─── */
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.stat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.stat-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}

/* ─── CHART BARS ─── */
.chart{display:flex;align-items:flex-end;gap:4px;height:80px;padding-top:10px}
.bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-val{font-size:8px;color:var(--text-tertiary);font-weight:600}
.bar-fill{width:100%;border-radius:4px 4px 2px 2px;min-height:4px;position:relative;overflow:hidden}
.bar-fill::before{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--accent),rgba(77,124,254,0.6));border-radius:inherit}
.bar-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:linear-gradient(to bottom,rgba(255,255,255,0.15),transparent);border-radius:inherit}

/* ─── PROFILE ─── */
.profile-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.profile-row:last-child{border-bottom:none}
.profile-label{font-size:12px;color:var(--text-secondary)}
.profile-value{font-size:12px;font-weight:700;text-align:right}
.metric-big{font-family:var(--font-display);font-size:42px;letter-spacing:0.04em;line-height:1;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.metric-unit{font-size:13px;color:var(--text-secondary);font-weight:600;margin-top:4px}

/* ─── TIMER BARS ─── */
.timer-bar{position:fixed;bottom:calc(72px + var(--safe-bottom));left:50%;transform:translateX(-50%);border-radius:var(--radius);padding:14px 20px;z-index:100;display:flex;align-items:center;gap:14px;max-width:380px;width:calc(100% - 40px);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.timer-bar.rest{background:linear-gradient(135deg,rgba(0,229,160,0.9),rgba(0,201,142,0.9));box-shadow:0 8px 40px rgba(0,229,160,0.3)}
.timer-bar.hold{background:linear-gradient(135deg,rgba(255,122,69,0.9),rgba(232,93,42,0.9));box-shadow:0 8px 40px rgba(255,122,69,0.3)}
.timer-time{font-family:var(--font-display);font-size:36px;letter-spacing:0.06em;flex:1;color:#fff}
.timer-label{font-size:11px;font-weight:700;opacity:0.7;text-transform:uppercase;letter-spacing:0.1em;color:#fff}
.timer-close{background:rgba(0,0,0,0.2);border:none;color:#fff;border-radius:var(--radius-xs);padding:8px 14px;cursor:pointer;font-weight:800;font-family:var(--font);font-size:13px;backdrop-filter:blur(10px)}

/* ─── BOTTOM NAV ─── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(8,9,13,0.85);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 calc(10px + var(--safe-bottom));backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);z-index:90}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 16px;border-radius:12px;transition:all 0.2s;position:relative}
.nav-btn.active{background:var(--accent-dim)}
.nav-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.nav-icon svg{width:20px;height:20px;fill:none;stroke:var(--text-tertiary);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:all 0.2s}
.nav-btn.active .nav-icon svg{stroke:var(--accent)}
.nav-label{font-size:9px;font-weight:700;letter-spacing:0.06em;color:var(--text-tertiary);transition:color 0.2s}
.nav-btn.active .nav-label{color:var(--accent)}

/* ─── BACK BUTTON ─── */
.back{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius-xs);padding:8px 14px;font-size:12px;font-weight:600;color:var(--text-secondary);cursor:pointer;font-family:var(--font);margin-bottom:20px;transition:all 0.2s}
.back:active{background:var(--card-hover);transform:scale(0.97)}
.back svg{width:14px;height:14px;stroke:var(--text-secondary);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ─── EMPTY STATE ─── */
.empty{text-align:center;padding:24px;color:var(--text-tertiary);font-size:12px;font-weight:500}

/* ─── ANIMATIONS ─── */
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:slideUp 0.35s ease-out both}
.anim-1{animation-delay:0.05s}.anim-2{animation-delay:0.1s}.anim-3{animation-delay:0.15s}.anim-4{animation-delay:0.2s}.anim-5{animation-delay:0.25s}
@keyframes expandIn{from{opacity:0;max-height:0}to{opacity:1;max-height:600px}}
.expand{animation:expandIn 0.3s ease-out both;overflow:hidden}

/* ─── SPLASH SCREEN ─── */
.splash{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s,visibility 0.5s}
.splash.hide{opacity:0;visibility:hidden}
.splash-logo{font-family:var(--font-display);font-size:56px;letter-spacing:0.2em;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:splashPulse 2s ease-in-out infinite}
.splash-sub{font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--text-tertiary);margin-top:8px;font-weight:600}
@keyframes splashPulse{0%,100%{opacity:1}50%{opacity:0.6}}
.splash-line{width:48px;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:1px;margin-top:24px;animation:splashLine 1.5s ease-in-out infinite}
@keyframes splashLine{0%{transform:scaleX(0.3);opacity:0.5}50%{transform:scaleX(1);opacity:1}100%{transform:scaleX(0.3);opacity:0.5}}

/* Scrollbar */
::-webkit-scrollbar{width:0;background:transparent}
</style>
</head>

</svg>

<div class="ambient"></div>
<div class="noise"></div>

<!-- Splash -->

</div>

<div class="app" id="app"></div>

// STATE
// ═══════════════════════════════════════
const L=(k,d)=>{try{const v=localStorage.getItem('gv-'+k);return v?JSON.parse(v):d}catch{return d}};
const S=(k,v)=>{try{localStorage.setItem('gv-'+k,JSON.stringify(v))}catch{}};

let st={
  view:'home',selDay:null,selSkill:null,expEx:null,
  done:L('done',{}),skillLv:L('skills',Object.fromEntries(Object.entries(SKILLS).map(([k,v])=>[k,v.current]))),
  holdLogs:L('holds',{}),repLogs:L('reps',{}),weekLog:L('week',{}),bw:L('bw',[]),
  timer:null,timerLeft:0,sw:false,swTime:0,
  inputTarget:null,inputVal:'',showBwInput:false,bwInput:'',profileEdit:false,
  profile:L('profile',PROFILE)
};

function set(p){
  Object.assign(st,p);
  ['done','skills','holds','reps','week','bw','profile'].forEach(k=>{
    const map={done:'done',skills:'skillLv',holds:'holdLogs',reps:'repLogs',week:'weekLog',bw:'bw',profile:'profile'};
    if(map[k] in p) S(k,st[map[k]]);
  });
  render();
}

const td=()=>new Date().toISOString().slice(0,10);
const fm=s=>`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
const sk=(d,s,e,i)=>`${td()}-${d}-${s}-${e}-${i}`;

function dp(dk){
  const d=PLAN[dk];let t=0,n=0;
  d.sections.forEach((s,si)=>s.exercises.forEach((e,ei)=>{for(let i=0;i<e.sets;i++){t++;if(st.done[sk(dk,si,ei,i)])n++}}));
  return t?Math.round(n/t*100):0;
}
function wk(){return(st.weekLog[td().slice(0,7)]||[]).length}

// Timers
let _ti=null,_sw=null;
function startTimer(s){clearInterval(_ti);set({timer:s,timerLeft:s});_ti=setInterval(()=>{st.timerLeft--;if(st.timerLeft<=0){clearInterval(_ti);st.timer=null;st.timerLeft=0}render()},1000)}
function stopTimer(){clearInterval(_ti);set({timer:null,timerLeft:0})}
function toggleSW(skill){if(st.sw){clearInterval(_sw);if(st.swTime>0&&skill){const l={...st.holdLogs};l[skill]=[...(l[skill]||[]),{val:st.swTime,date:td()}];set({sw:false,swTime:0,holdLogs:l})}else set({sw:false,swTime:0})}else{set({sw:true,swTime:0});_sw=setInterval(()=>{st.swTime++;render()},1000)}}
function stopSW(){clearInterval(_sw);set({sw:false,swTime:0})}

// Splash
setTimeout(()=>document.getElementById('splash').classList.add('hide'),1200);

};

// ═══════════════════════════════════════
// PROGRESS RING
// ═══════════════════════════════════════
function ring(pct,size=48){
  const r=(size-6)/2,c=2*Math.PI*r,off=c-(pct/100)*c;
  const col=pct===100?'var(--success)':'';
  return`<div class="ring-wrap" style="width:${size}px;height:${size}px"><svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle class="ring-bg" cx="${size/2}" cy="${size/2}" r="${r}"/><circle class="ring-fill" cx="${size/2}" cy="${size/2}" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${off}" ${col?`style="stroke:${col}"`:''}"/></svg><div class="ring-text ${pct===100?'done':''}">${pct}%</div></div>`;
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function render(){
  const a=document.getElementById('app');
  let h='';
  if(st.view==='home')h=rHome();
  else if(st.view==='workout')h=rWorkout();
  else if(st.view==='skills')h=rSkills();
  else if(st.view==='stats')h=rStats();
  else if(st.view==='profile')h=rProfile();

  if(st.timer)h+=`<div class="timer-bar rest"><div class="timer-time">${fm(st.timerLeft)}</div><div class="timer-label">Pause</div><button class="timer-close" onclick="stopTimer()">✕</button></div>`;
  else if(st.sw)h+=`<div class="timer-bar hold"><div class="timer-time">${fm(st.swTime)}</div><div class="timer-label">Hold</div><button class="timer-close" onclick="stopSW()">⏹</button></div>`;

  h+=`<div class="nav">
    ${['plan','skills','stats','profile'].map(v=>`<div class="nav-btn ${st.view===(v==='plan'?'home':v)?'active':''}" onclick="set({view:'${v==='plan'?'home':v}',selDay:null,selSkill:null,expEx:null})"><div class="nav-icon">${ICO[v]}</div><div class="nav-label">${v==='plan'?'Plan':v==='skills'?'Skills':v==='stats'?'Stats':'Profil'}</div></div>`).join('')}
  </div>`;
  a.innerHTML=h;
}

function rHome(){
  const wc=wk();
  let dots='';for(let i=0;i<5;i++)dots+=`<div class="week-dot ${i<wc?'filled':i===wc?'current':''}"></div>`;

  let cards='';
  DAYS.forEach((dk,di)=>{
    const d=PLAN[dk],p=dp(dk),te=d.sections.reduce((a,s)=>a+s.exercises.length,0);
    cards+=`<div class="card ${d.type==='skill'?'glow':''} anim anim-${di+1}" onclick="set({view:'workout',selDay:'${dk}',expEx:null})">
      <div style="display:flex;align-items:center;gap:14px">
        ${ring(p)}
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
            <span style="font-size:11px;color:var(--text-tertiary);font-weight:700">${DAYNAMES[di]}</span>
            ${d.type==='skill'?'<span class="ex-skill-tag">SKILL</span>':''}
          </div>
          <div style="font-size:15px;font-weight:800;letter-spacing:-0.01em">${d.emoji} ${d.name}</div>
          <div style="font-size:11px;color:var(--text-secondary);margin-top:2px">${te} Übungen · ~90 Min</div>
        </div>
      </div>
    </div>`;
  });

  return`<div class="page"><div class="header">
    <div style="display:flex;align-items:flex-end;justify-content:space-between">
      <div><div class="logo">GRAVITY</div><div class="logo-sub">Calisthenics System</div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div class="week-dots">${dots}</div>
        <div style="font-size:10px;color:var(--text-tertiary);font-weight:600">${wc}/5 diese Woche</div>
      </div>
    </div>
  </div>
  <div class="body">${cards}</div></div>`;
}

function rWorkout(){
  if(!st.selDay)return'';
  const d=PLAN[st.selDay],p=dp(st.selDay);
  let secs='';
  d.sections.forEach((sec,si)=>{
    let exs='';
    sec.exercises.forEach((ex,ei)=>{
      const allD=Array.from({length:ex.sets},(_,i)=>!!st.done[sk(st.selDay,si,ei,i)]).every(Boolean);
      const ek=`${si}-${ei}`;const isE=st.expEx===ek;
      const skl=ex.skill?SKILLS[ex.skill]:null;const slv=ex.skill?st.skillLv[ex.skill]:null;const sp=skl?skl.progressions[slv-1]:null;
      let body='';
      if(isE){
        let tips='';
        if(ex.note)tips+=`<div class="tip note">💡 ${ex.note}</div>`;
        if(sp?.tip)tips+=`<div class="tip coach">🎓 ${sp.tip}</div>`;
        let circles='';for(let i=0;i<ex.sets;i++){const dn=!!st.done[sk(st.selDay,si,ei,i)];circles+=`<div class="set ${dn?'done':''}" onclick="event.stopPropagation();const k=sk('${st.selDay}',${si},${ei},${i});const d={...st.done};d[k]=!d[k];set({done:d})"><span>${i+1}</span></div>`}
        let btns=`<button class="btn btn-ghost" onclick="event.stopPropagation();startTimer(${ex.rest})">⏱ ${ex.rest}s Pause</button>`;
        if(skl&&sp?.metric==='hold')btns+=`<button class="btn btn-ghost" onclick="event.stopPropagation();toggleSW('${ex.skill}')">${st.sw?'⏹ '+fm(st.swTime):'⏱ Stoppuhr'}</button>`;
        if(skl)btns+=`<button class="btn btn-ghost" onclick="event.stopPropagation();set({inputTarget:{type:'${sp?.metric}',skill:'${ex.skill}',name:'${ex.name.replace(/'/g,"\\'")}'},inputVal:''})">📝 Log</button>`;
        let inp='';
        if(st.inputTarget?.name===ex.name)inp=`<div class="input-row"><input class="input" type="number" placeholder="${st.inputTarget.type==='hold'?'Sekunden':'Reps'}" value="${st.inputVal}" oninput="st.inputVal=this.value" onclick="event.stopPropagation()"><button class="btn btn-primary" onclick="event.stopPropagation();if(!st.inputVal)return;const l={...st.${st.inputTarget.type==='hold'?'holdLogs':'repLogs'}};l['${st.inputTarget.skill}']=[...(l['${st.inputTarget.skill}']||[]),{val:parseInt(st.inputVal),date:td()}];set({${st.inputTarget.type==='hold'?'holdLogs':'repLogs'}:l,inputVal:'',inputTarget:null})">Speichern</button></div>`;
        let logs='';
        if(ex.skill&&st.holdLogs[ex.skill]?.length>0){const la=st.holdLogs[ex.skill].slice(-1)[0];logs+=`<div class="log-entry hold">⏱ Letzter Hold: ${la.val}s · ${la.date}</div>`}
        if(ex.skill&&st.repLogs[ex.skill]?.length>0){const la=st.repLogs[ex.skill].slice(-1)[0];logs+=`<div class="log-entry rep">💪 Letzte Reps: ${la.val} · ${la.date}</div>`}
        body=`<div class="ex-body expand">${tips}<div class="sets">${circles}</div><div class="actions">${btns}</div>${inp}${logs}</div>`;
      }
      const exNum=ei+1;
      exs+=`<div class="ex ${allD?'done':''}">
        <div class="ex-header" onclick="set({expEx:st.expEx==='${ek}'?null:'${ek}'})">
          <div class="ex-num">${allD?'✓':exNum}</div>
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-detail">${ex.sets}×${ex.reps} · ${ex.rest}s Pause</div>
            ${skl?`<div class="ex-skill-tag">Stufe ${slv}: ${sp?.name}</div>`:''}
          </div>
          <div class="chevron ${isE?'open':''}">▾</div>
        </div>
        ${body}
      </div>`;
    });
    secs+=`<div class="section"><div class="section-text">${sec.icon} ${sec.title}</div><div class="section-line"></div></div>${exs}`;
  });
  let fin='';
  if(p===100)fin=`<button class="btn btn-primary btn-full" onclick="const mk=td().slice(0,7);const w={...st.weekLog};const e=w[mk]||[];if(!e.includes(td()))w[mk]=[...e,td()];set({weekLog:w,view:'home'})">✅ Training abschließen</button>`;

  return`<div class="page"><div class="header">
    <button class="back" onclick="set({view:'home',expEx:null})">${ICO.back} Zurück</button>
    <div style="display:flex;align-items:center;gap:16px">
      ${ring(p,56)}
      <div>
        <div style="font-size:20px;font-weight:800">${d.emoji} ${d.name}</div>
        <div style="font-size:12px;color:var(--text-secondary);margin-top:2px">${p===100?'Abgeschlossen!':'In Bearbeitung...'}</div>
      </div>
    </div>
  </div><div class="body">${secs}${fin}</div></div>`;
}

function rSkills(){
  if(st.selSkill){
    const s=SKILLS[st.selSkill],lv=st.skillLv[st.selSkill];
    let dots='';s.progressions.forEach((p,i)=>{
      dots+=`<div class="lvl ${i+1<lv?'past':i+1===lv?'now':'future'}">${i+1}</div>`;
      if(i<s.progressions.length-1)dots+=`<div class="lvl-line ${i+1<lv?'past':'next'}"></div>`;
    });
    let progs='';s.progressions.forEach((p,i)=>{
      const cur=i+1===lv,dn=i+1<lv;
      let btn='';if(cur)btn=`<button class="btn btn-primary" style="font-size:10px;padding:6px 12px" onclick="const sl={...st.skillLv};sl['${st.selSkill}']=Math.min(${lv+1},${s.progressions.length});set({skillLv:sl})">Level Up ↑</button>`;
      let logs='';
      if(cur&&(st.holdLogs[st.selSkill]?.length>0||st.repLogs[st.selSkill]?.length>0)){
        let items='';
        (st.holdLogs[st.selSkill]||[]).slice(-5).forEach(l=>{items+=`<div class="log-entry hold">⏱ ${l.val}s · ${l.date}</div>`});
        (st.repLogs[st.selSkill]||[]).slice(-5).forEach(l=>{items+=`<div class="log-entry rep">💪 ${l.val} Reps · ${l.date}</div>`});
        logs=`<div style="margin-top:12px">${items}</div>`;
      }
      progs+=`<div class="ex ${dn?'done':''}" style="opacity:${i+1>lv+1?'0.35':'1'}">
        <div style="padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
          <div style="flex:1">
            <div class="ex-name" style="color:${dn?'var(--success)':cur?'var(--accent)':'var(--text-tertiary)'}">${dn?'✓ ':cur?'→ ':''}${p.name}</div>
            <div class="ex-detail" style="margin-top:3px">${p.desc}</div>
            <div style="font-size:10px;color:${cur?'var(--accent)':'var(--text-tertiary)'};margin-top:4px;font-weight:600">Ziel: ${p.target}</div>
            ${p.tip&&cur?`<div class="tip coach" style="margin-top:8px">🎓 ${p.tip}</div>`:''}
          </div>
          ${btn}
        </div>
        ${logs?`<div style="padding:0 16px 14px">${logs}</div>`:''}
      </div>`;
    });
    return`<div class="page"><div class="header">
      <button class="back" onclick="set({selSkill:null})">${ICO.back} Alle Skills</button>
      <div style="font-size:22px;font-weight:800;margin-bottom:4px">${s.icon} ${s.name}</div>
      <div class="levels">${dots}</div>
    </div><div class="body">${progs}</div></div>`;
  }

  let cards='';Object.entries(SKILLS).forEach(([k,s],i)=>{
    const lv=st.skillLv[k],mx=s.progressions.length,pr=s.progressions[lv-1];
    cards+=`<div class="skill-card anim anim-${i+1}" style="--prog:${lv/mx}" onclick="set({selSkill:'${k}'})">
      <div style="display:flex;align-items:center;gap:14px">
        <div style="font-size:28px">${s.icon}</div>
        <div style="flex:1">
          <div style="font-size:15px;font-weight:800">${s.name}</div>
          <div style="font-size:11px;color:var(--accent);margin-top:2px;font-weight:600">Stufe ${lv}: ${pr?.name}</div>
          <div style="font-size:10px;color:var(--text-tertiary);margin-top:2px">Ziel: ${pr?.target}</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:var(--font-display);font-size:28px;color:var(--accent);letter-spacing:0.04em">${lv}</div>
          <div style="font-size:9px;color:var(--text-tertiary);font-weight:600">von ${mx}</div>
        </div>
      </div>
    </div>`;
  });
  return`<div class="page"><div class="header"><div class="logo">SKILLS</div><div class="logo-sub">Progressionen & Level</div></div><div class="body">${cards}</div></div>`;
}

function rStats(){
  // BW
  let bwC='<div class="empty">Noch keine Einträge</div>';
  if(st.bw.length>0){const sl=st.bw.slice(-14),vs=sl.map(x=>x.value),mn=Math.min(...vs)-2,mx=Math.max(...vs)+2;let bars='';sl.forEach(w=>{const p=mx===mn?50:((w.value-mn)/(mx-mn))*100;bars+=`<div class="bar"><div class="bar-val">${w.value}</div><div class="bar-fill" style="height:${Math.max(p,6)}%"></div></div>`});bwC=`<div class="chart">${bars}</div>`}
  let bwI='';if(st.showBwInput)bwI=`<div class="input-row" style="margin-top:0;margin-bottom:14px"><input class="input" type="number" placeholder="Gewicht in kg" value="${st.bwInput}" oninput="st.bwInput=this.value"><button class="btn btn-primary" onclick="if(!st.bwInput)return;set({bw:[...st.bw,{value:parseFloat(st.bwInput),date:td()}],bwInput:'',showBwInput:false})">💾</button></div>`;

  // Holds
  let holds='<div class="empty">Noch keine Holds</div>';
  if(Object.keys(st.holdLogs).length>0){holds='';Object.entries(st.holdLogs).forEach(([k,l])=>{const b=Math.max(...l.map(x=>x.val)),s=SKILLS[k];holds+=`<div class="stat-row"><div><div style="font-size:12px;font-weight:700">${s?.icon} ${s?.name}</div><div style="font-size:10px;color:var(--text-tertiary);margin-top:2px">${l.length} Einträge</div></div><div style="font-family:var(--font-display);font-size:22px;color:var(--accent)">${b}s</div></div>`})}

  // Reps
  let reps='<div class="empty">Noch keine Reps</div>';
  if(Object.keys(st.repLogs).length>0){reps='';Object.entries(st.repLogs).forEach(([k,l])=>{const b=Math.max(...l.map(x=>x.val)),s=SKILLS[k];reps+=`<div class="stat-row"><div><div style="font-size:12px;font-weight:700">${s?.icon} ${s?.name}</div><div style="font-size:10px;color:var(--text-tertiary);margin-top:2px">${l.length} Einträge</div></div><div style="font-family:var(--font-display);font-size:22px;color:var(--accent2)">${b}</div></div>`})}

  // Freq
  let freq='<div class="empty">Noch keine Logs</div>';
  const we=Object.entries(st.weekLog).sort().reverse().slice(0,4);
  if(we.length>0){freq='';we.forEach(([m,d])=>{freq+=`<div class="stat-row"><div style="font-size:12px;font-weight:700">${m}</div><div><span style="font-family:var(--font-display);font-size:22px;color:var(--accent)">${d.length}</span><span style="font-size:10px;color:var(--text-tertiary);margin-left:4px">Tage</span></div></div>`})}

  return`<div class="page"><div class="header"><div class="logo">STATS</div><div class="logo-sub">Fortschritt & Tracking</div></div>
  <div class="body">
    <div class="stat anim anim-1"><div class="stat-header"><div class="stat-title">📊 Körpergewicht</div><button class="btn btn-ghost" onclick="set({showBwInput:!st.showBwInput})">+ Eintrag</button></div>${bwI}${bwC}</div>
    <div class="stat anim anim-2"><div class="stat-title" style="margin-bottom:14px">⏱ Beste Haltezeiten</div>${holds}</div>
    <div class="stat anim anim-3"><div class="stat-title" style="margin-bottom:14px">💪 Beste Reps</div>${reps}</div>
    <div class="stat anim anim-4"><div class="stat-title" style="margin-bottom:14px">📅 Trainingsfrequenz</div>${freq}</div>
    <button class="btn btn-danger btn-full" onclick="if(confirm('Alle Daten wirklich löschen?')){set({done:{},skillLv:Object.fromEntries(Object.entries(SKILLS).map(([k,v])=>[k,v.current])),holdLogs:{},repLogs:{},weekLog:{},bw:[]})}">Alle Daten zurücksetzen</button>
  </div></div>`;
}

function rProfile(){
  const p=st.profile;
  const fields=[['height','Größe'],['weight','Gewicht'],['age','Alter'],['goal','Ziel'],['level','Level'],['frequency','Frequenz'],['duration','Dauer'],['focus','Fokus'],['equipment','Equipment'],['nutrition','Ernährung'],['injuries','Verletzungen'],['split','Split']];
  let rows='';
  if(st.profileEdit){fields.forEach(([k,l])=>{rows+=`<div style="margin-bottom:14px"><div style="font-size:11px;color:var(--text-tertiary);margin-bottom:6px;font-weight:600">${l}</div><input class="input" value="${p[k]}" oninput="st.profile={...st.profile,${k}:this.value}"></div>`});
    rows+=`<button class="btn btn-primary btn-full" onclick="S('profile',st.profile);set({profileEdit:false})">Speichern</button>`}
  else{fields.forEach(([k,l])=>{rows+=`<div class="profile-row"><span class="profile-label">${l}</span><span class="profile-value">${p[k]}</span></div>`})}

  // BMI & Cal
  let metrics='';
  const hm=p.height.match(/(\d+)/),wm=p.weight.match(/(\d+)/);
  if(hm&&wm){
    const hc=parseInt(hm[1])+2.5,wk=parseInt(wm[1])+2.5;
    const bmi=(wk/((hc/100)**2)).toFixed(1);
    const age=parseInt((p.age.match(/(\d+)/)||[0,30])[1]);
    const bmr=Math.round(10*wk+6.25*hc-5*age+5);
    const tdee=Math.round(bmr*1.725);
    const surplus=Math.round(tdee+300);
    metrics=`<div class="stat anim anim-2" style="display:flex;gap:20px">
      <div style="flex:1;text-align:center;padding:8px 0"><div class="metric-big">${bmi}</div><div class="metric-unit">BMI</div></div>
      <div style="width:1px;background:var(--border)"></div>
      <div style="flex:1;text-align:center;padding:8px 0"><div class="metric-big">${surplus}</div><div class="metric-unit">kcal Aufbau</div></div>
    </div>
    <div class="stat anim anim-3">
      <div class="stat-row"><span class="profile-label">Grundumsatz (BMR)</span><span class="profile-value">${bmr} kcal</span></div>
      <div class="stat-row"><span class="profile-label">TDEE (sehr aktiv)</span><span class="profile-value">${tdee} kcal</span></div>
      <div class="stat-row"><span class="profile-label">Aufbau (+300)</span><span class="profile-value" style="color:var(--accent)">${surplus} kcal</span></div>
      <div style="font-size:10px;color:var(--text-tertiary);margin-top:10px;line-height:1.5">Schätzung nach Mifflin-St Jeor. Für exakte Werte Ernährungsberater konsultieren.</div>
    </div>`;
  }

  return`<div class="page"><div class="header">
    <div style="display:flex;justify-content:space-between;align-items:flex-end">
      <div><div class="logo">PROFIL</div><div class="logo-sub">Persönliche Daten</div></div>
      <button class="btn btn-ghost" onclick="set({profileEdit:!st.profileEdit})">${st.profileEdit?'✕ Abbrechen':'✏️ Bearbeiten'}</button>
    </div>
  </div>
  <div class="body">
    <div class="stat anim anim-1"><div class="stat-title" style="margin-bottom:14px">👤 Trainingsinfo</div>${rows}</div>
    ${metrics}
    <div class="stat anim anim-4">
      <div class="stat-title" style="margin-bottom:10px">🔥 Strategie</div>
      <div style="font-size:12px;color:var(--text-secondary);line-height:1.7">
        Dein Plan hat <span style="color:var(--accent);font-weight:700">4 Skill-Tage</span> mit Fokus auf Rücken & Schultern. Skill-Arbeit steht immer am Anfang. Parallettes, Bänder und Gewichtsweste sind integriert.
      </div>
    </div>
  </div></div>`;
}

render();
</script>
</body>
</html>
