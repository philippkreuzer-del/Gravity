<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GRAVITY">
<meta name="theme-color" content="#08090d">
<title>GRAVITY</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiR1JBVklUWSIsInNob3J0X25hbWUiOiJHUkFWSVRZIiwic3RhcnRfdXJsIjoiLiIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiYmFja2dyb3VuZF9jb2xvciI6IiMwODA5MGQiLCJ0aGVtZV9jb2xvciI6IiMwODA5MGQifQ==">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{
--bg:#08090d;--surface:#0f1117;--card:#141620;--card-hover:#191c2a;
--border:rgba(255,255,255,0.04);--border-light:rgba(255,255,255,0.08);
--text:#f0eeeb;--text-secondary:#8a8997;--text-tertiary:#55546a;
--accent:#00e5a0;--accent-dim:rgba(0,229,160,0.08);
--accent2:#4d7cfe;--accent2-dim:rgba(77,124,254,0.08);
--warn:#ff7a45;--warn-dim:rgba(255,122,69,0.08);
--success:#34d399;--success-dim:rgba(52,211,153,0.08);
--danger:#f87171;
--radius:16px;--radius-sm:10px;--radius-xs:8px;
--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
--font:'Plus Jakarta Sans',system-ui,sans-serif;--font-display:'Bebas Neue',sans-serif;
}
body.light{
--bg:#f5f5f0;--surface:#eeeee8;--card:#ffffff;--card-hover:#f8f8f5;
--border:rgba(0,0,0,0.06);--border-light:rgba(0,0,0,0.1);
--text:#1a1a1a;--text-secondary:#6b6b6b;--text-tertiary:#9a9a9a;
--accent:#00b882;--accent-dim:rgba(0,184,130,0.08);
--accent2:#3d6bef;--accent2-dim:rgba(61,107,239,0.08);
--warn:#e5692e;--warn-dim:rgba(229,105,46,0.08);
--success:#22b07a;--success-dim:rgba(34,176,122,0.08);
--danger:#e04545;
}
html{background:var(--bg)}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;position:relative;transition:background 0.3s,color 0.3s}
input[type=number]{-moz-appearance:textfield}input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
textarea{font-family:var(--font);resize:none}

.ambient{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;overflow:hidden}
.ambient::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;top:-200px;right:-200px;background:radial-gradient(circle,rgba(0,229,160,0.04) 0%,transparent 70%);animation:af 20s ease-in-out infinite}
.ambient::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;bottom:-150px;left:-150px;background:radial-gradient(circle,rgba(77,124,254,0.03) 0%,transparent 70%);animation:af 25s ease-in-out infinite reverse}
body.light .ambient::before{background:radial-gradient(circle,rgba(0,184,130,0.06) 0%,transparent 70%)}
body.light .ambient::after{background:radial-gradient(circle,rgba(61,107,239,0.04) 0%,transparent 70%)}
@keyframes af{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,20px) scale(1.1)}}
.noise{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:1;opacity:0.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

.app{max-width:430px;margin:0 auto;position:relative;z-index:2;min-height:100vh;min-height:100dvh}
.page{padding-bottom:100px;opacity:0;animation:pi 0.4s ease-out 0.05s forwards}
@keyframes pi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.header{padding:calc(24px + var(--safe-top)) 20px 16px}.body{padding:0 20px}

.logo{font-family:var(--font-display);font-size:32px;letter-spacing:0.12em;background:linear-gradient(135deg,var(--accent) 0%,#4dffc3 40%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.logo-sub{font-size:11px;font-weight:600;color:var(--text-tertiary);letter-spacing:0.15em;text-transform:uppercase;margin-top:2px}

/* Date display */
.date-display{margin-top:12px;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);display:flex;align-items:center;gap:14px}
.date-day{font-family:var(--font-display);font-size:44px;line-height:1;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.date-info{flex:1}
.date-weekday{font-size:14px;font-weight:800;letter-spacing:0.02em}
.date-month{font-size:11px;color:var(--text-secondary);font-weight:600;margin-top:1px}

.week-dots{display:flex;gap:6px;align-items:center}
.week-dot{width:8px;height:8px;border-radius:50%;background:var(--border-light);transition:all 0.3s}
.week-dot.filled{background:var(--accent);box-shadow:0 0 8px rgba(0,229,160,0.4)}
.week-dot.current{border:2px solid var(--accent);background:transparent;width:10px;height:10px}

.streak{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(255,122,69,0.1),rgba(255,60,60,0.08));border:1px solid rgba(255,122,69,0.15);border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;color:var(--warn)}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:10px;position:relative;overflow:hidden;transition:all 0.25s;cursor:pointer}
.card:active{transform:scale(0.98);background:var(--card-hover)}
.card.glow{border-color:rgba(0,229,160,0.12)}
.card.glow::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,229,160,0.3),transparent)}
.card.deload{border-color:rgba(255,122,69,0.15);background:linear-gradient(135deg,rgba(255,122,69,0.03),rgba(255,60,60,0.02))}

.ring-wrap{position:relative;flex-shrink:0}.ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border-light);stroke-width:3}
.ring-fill{fill:none;stroke:url(#ringGrad);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1)}
.ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--accent)}
.ring-text.done{color:var(--success)}

.section{display:flex;align-items:center;gap:8px;margin:24px 0 12px}
.section-line{flex:1;height:1px;background:var(--border)}
.section-text{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:var(--text-tertiary);white-space:nowrap}

.ex{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden;transition:all 0.25s}
.ex.done{border-color:rgba(52,211,153,0.15);background:rgba(52,211,153,0.02)}
body.light .ex.done{background:rgba(34,176,122,0.04)}
body.light .body-outline{fill:rgba(0,0,0,0.04);stroke:rgba(0,0,0,0.15)}
body.light .muscle-region{fill:rgba(0,0,0,0.03);stroke:rgba(0,0,0,0.08)}
body.light .muscle-region.primary{fill:rgba(0,184,130,0.3);stroke:rgba(0,184,130,0.5)}
body.light .muscle-region.secondary{fill:rgba(61,107,239,0.2);stroke:rgba(61,107,239,0.4)}
.anatomy-detail{fill:var(--border-light);stroke:var(--border-light);stroke-width:0.5}
.anatomy-line{stroke:var(--border);stroke-width:0.4}
.ex-header{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.ex-num{width:28px;height:28px;border-radius:50%;background:var(--accent-dim);color:var(--accent);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ex.done .ex-num{background:var(--success-dim);color:var(--success)}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:13px;font-weight:700;line-height:1.3}
.ex.done .ex-name{color:var(--success)}
.ex-detail{font-size:11px;color:var(--text-secondary);margin-top:2px}
.ex-skill-tag{font-size:9px;font-weight:700;color:var(--accent);background:var(--accent-dim);padding:2px 8px;border-radius:20px;display:inline-block;margin-top:4px}
.chevron{color:var(--text-tertiary);font-size:14px;transition:transform 0.3s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}

.ex-body{padding:0 16px 16px;border-top:1px solid var(--border)}
.tip{font-size:11px;padding:10px 12px;border-radius:var(--radius-xs);margin-top:12px;line-height:1.5}
.tip.note{color:var(--warn);background:var(--warn-dim)}.tip.coach{color:var(--accent2);background:var(--accent2-dim)}

.sets{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.set{width:38px;height:38px;border-radius:50%;border:2px solid var(--border-light);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text-tertiary);cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.set::before{content:'';position:absolute;inset:0;border-radius:50%;background:var(--accent);transform:scale(0);transition:transform 0.25s}
.set.done{border-color:var(--accent);color:var(--bg)}.set.done::before{transform:scale(1)}
.set span{position:relative;z-index:1}

.actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.btn{font-family:var(--font);border:none;border-radius:var(--radius-xs);padding:9px 14px;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px}
.btn:active{transform:scale(0.95)}
.btn-ghost{background:var(--surface);color:var(--text-secondary);border:1px solid var(--border-light)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#00c98e);color:#08090d;box-shadow:0 2px 12px rgba(0,229,160,0.2)}
.btn-danger{background:transparent;color:var(--danger);border:1px solid rgba(248,113,113,0.15)}
.btn-full{width:100%;justify-content:center;padding:14px;font-size:13px;margin-top:16px}

.input{font-family:var(--font);background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius-xs);padding:10px 14px;color:var(--text);font-size:13px;width:100%;outline:none;transition:border-color 0.2s}
.input:focus{border-color:rgba(0,229,160,0.3)}
.input-row{display:flex;gap:8px;margin-top:10px}

.log-entry{font-size:10px;margin-top:8px;padding:6px 10px;border-radius:var(--radius-xs);display:flex;align-items:center;gap:6px}
.log-entry.hold{color:var(--accent);background:var(--accent-dim)}.log-entry.rep{color:var(--accent2);background:var(--accent2-dim)}

.skill-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:10px;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden}
.skill-card:active{transform:scale(0.98)}
.skill-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transform:scaleX(var(--prog,0));transform-origin:left;transition:transform 0.6s}

.levels{display:flex;align-items:center;gap:4px;margin:20px 0}
.lvl{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.lvl.past{background:var(--success-dim);color:var(--success);border:2px solid rgba(52,211,153,0.2)}
.lvl.now{background:var(--accent-dim);color:var(--accent);border:2px solid rgba(0,229,160,0.3);box-shadow:0 0 12px rgba(0,229,160,0.15)}
.lvl.future{background:var(--surface);color:var(--text-tertiary);border:2px solid var(--border)}
.lvl-line{flex:1;height:2px;border-radius:1px}.lvl-line.past{background:var(--success)}.lvl-line.next{background:var(--border-light)}

.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.stat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.stat-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}

.chart{display:flex;align-items:flex-end;gap:4px;height:80px;padding-top:10px}
.bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-val{font-size:8px;color:var(--text-tertiary);font-weight:600}
.bar-fill{width:100%;border-radius:4px 4px 2px 2px;min-height:4px;position:relative;overflow:hidden}
.bar-fill::before{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--accent),rgba(77,124,254,0.6))}

/* Mini sparkline chart */
.sparkline{display:flex;align-items:flex-end;gap:2px;height:40px;margin-top:8px}
.spark-bar{flex:1;border-radius:2px;min-height:2px;background:var(--accent);opacity:0.7;transition:all 0.3s}
.spark-bar:last-child{opacity:1;background:linear-gradient(to top,var(--accent),var(--accent2))}

/* Week comparison */
.compare{display:flex;gap:12px;margin-top:12px}
.compare-col{flex:1;text-align:center;padding:12px;border-radius:var(--radius-xs);background:var(--surface);border:1px solid var(--border)}
.compare-val{font-family:var(--font-display);font-size:28px;letter-spacing:0.04em}
.compare-label{font-size:9px;color:var(--text-tertiary);font-weight:600;margin-top:2px;text-transform:uppercase;letter-spacing:0.1em}
.compare-diff{font-size:11px;font-weight:700;margin-top:4px}
.compare-diff.up{color:var(--success)}.compare-diff.down{color:var(--danger)}.compare-diff.same{color:var(--text-tertiary)}

.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:12px}
.hm-label{font-size:8px;color:var(--text-tertiary);text-align:center;font-weight:600;padding:2px 0}
.hm-cell{aspect-ratio:1;border-radius:3px;background:var(--surface);border:1px solid var(--border);transition:all 0.2s}
.hm-cell.l1{background:rgba(0,229,160,0.15);border-color:rgba(0,229,160,0.1)}
.hm-cell.l2{background:rgba(0,229,160,0.3);border-color:rgba(0,229,160,0.15)}
.hm-cell.today{border-color:var(--accent);box-shadow:0 0 4px rgba(0,229,160,0.3)}
.hm-cell.future{opacity:0.3}

.badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.badge{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:var(--radius-xs);font-size:11px;font-weight:700;border:1px solid var(--border)}
.badge.earned{background:var(--accent-dim);border-color:rgba(0,229,160,0.15);color:var(--accent)}
.badge.locked{background:var(--surface);color:var(--text-tertiary);opacity:0.5}

.profile-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.profile-row:last-child{border-bottom:none}
.profile-label{font-size:12px;color:var(--text-secondary)}.profile-value{font-size:12px;font-weight:700;text-align:right}
.metric-big{font-family:var(--font-display);font-size:42px;letter-spacing:0.04em;line-height:1;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.metric-unit{font-size:13px;color:var(--text-secondary);font-weight:600;margin-top:4px}

.theme-toggle{width:44px;height:24px;border-radius:12px;background:var(--surface);border:1px solid var(--border-light);cursor:pointer;position:relative;transition:all 0.3s}
.theme-toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--accent);transition:transform 0.3s;box-shadow:0 1px 4px rgba(0,0,0,0.2)}
body.light .theme-toggle::after{transform:translateX(20px)}
.theme-toggle .ico{position:absolute;top:4px;font-size:12px;z-index:1;transition:opacity 0.3s}
.theme-toggle .moon{left:5px;opacity:1}.theme-toggle .sun{right:5px;opacity:0.4}
body.light .theme-toggle .moon{opacity:0.4}body.light .theme-toggle .sun{opacity:1}

.drawer{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.drawer-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.drawer-body{padding:0 16px 16px;border-top:1px solid var(--border)}
.warmup-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.warmup-item:last-child{border-bottom:none}
.warmup-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}

.note-area{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius-xs);padding:10px 14px;color:var(--text);font-size:12px;width:100%;min-height:60px;outline:none;line-height:1.5}
.note-area:focus{border-color:rgba(0,229,160,0.3)}

/* Custom exercise modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius) var(--radius) 0 0;padding:24px 20px 32px;width:100%;max-width:430px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:800;margin-bottom:16px}

.timer-bar{position:fixed;bottom:calc(72px + var(--safe-bottom));left:50%;transform:translateX(-50%);border-radius:var(--radius);padding:14px 20px;z-index:100;display:flex;align-items:center;gap:14px;max-width:380px;width:calc(100% - 40px);backdrop-filter:blur(20px)}
.timer-bar.rest{background:linear-gradient(135deg,rgba(0,229,160,0.9),rgba(0,201,142,0.9));box-shadow:0 8px 40px rgba(0,229,160,0.3)}
.timer-bar.hold{background:linear-gradient(135deg,rgba(255,122,69,0.9),rgba(232,93,42,0.9));box-shadow:0 8px 40px rgba(255,122,69,0.3)}
.timer-time{font-family:var(--font-display);font-size:36px;letter-spacing:0.06em;flex:1;color:#fff}
.timer-label{font-size:11px;font-weight:700;opacity:0.7;text-transform:uppercase;letter-spacing:0.1em;color:#fff}
.timer-close{background:rgba(0,0,0,0.2);border:none;color:#fff;border-radius:var(--radius-xs);padding:8px 14px;cursor:pointer;font-weight:800;font-family:var(--font)}

.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(8,9,13,0.85);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 calc(10px + var(--safe-bottom));backdrop-filter:blur(30px);z-index:90;transition:background 0.3s}
body.light .nav{background:rgba(245,245,240,0.85)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 14px;border-radius:12px;transition:all 0.2s}
.nav-btn.active{background:var(--accent-dim)}
.nav-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.nav-icon svg{width:20px;height:20px;fill:none;stroke:var(--text-tertiary);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:all 0.2s}
.nav-btn.active .nav-icon svg{stroke:var(--accent)}
.nav-label{font-size:9px;font-weight:700;letter-spacing:0.06em;color:var(--text-tertiary)}.nav-btn.active .nav-label{color:var(--accent)}

.back{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius-xs);padding:8px 14px;font-size:12px;font-weight:600;color:var(--text-secondary);cursor:pointer;font-family:var(--font);margin-bottom:20px}
.back:active{transform:scale(0.97)}
.back svg{width:14px;height:14px;stroke:var(--text-secondary);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.empty{text-align:center;padding:24px;color:var(--text-tertiary);font-size:12px}

@keyframes su{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:su 0.35s ease-out both}.anim-1{animation-delay:.05s}.anim-2{animation-delay:.1s}.anim-3{animation-delay:.15s}.anim-4{animation-delay:.2s}.anim-5{animation-delay:.25s}

const td=()=>new Date().toISOString().slice(0,10);

function dp(dk){const d=PLAN[dk];let t=0,n=0;d.sections.forEach((s,si)=>s.exercises.forEach((e,ei)=>{for(let i=0;i<e.sets;i++){t++;if(st.done[skk(dk,si,ei,i)])n++}}));
// Also count custom exercises
const cx=(st.customEx||[]).filter(c=>c.day===dk);
cx.forEach((c,ci)=>{for(let i=0;i<c.sets;i++){t++;if(st.done[`${td()}-${dk}-custom-${ci}-${i}`])n++}});
return t?Math.round(n/t*100):0}

function wkc(){return(st.weekLog[td().slice(0,7)]||[]).length}
function getStreak(s){const all=new Set(Object.values(s.weekLog).flat());if(!all.size)return 0;let streak=0,d=new Date();const ts=td();const y=new Date(d);y.setDate(y.getDate()-1);const ys=y.toISOString().slice(0,10);if(!all.has(ts)&&!all.has(ys))return 0;if(!all.has(ts))d=y;while(true){const ds=d.toISOString().slice(0,10);if(all.has(ds)){streak++;d.setDate(d.getDate()-1)}else break}return streak}
function isDeload(){const all=Object.values(st.weekLog).flat();const tw=new Set(all.map(d=>d.slice(0,7))).size;return tw>0&&tw%4===0&&st.deloadWeek!==tw}

function getWeekTrainCount(weeksAgo){const n=new Date();n.setDate(n.getDate()-weeksAgo*7);const mk=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;const days=st.weekLog[mk]||[];const weekStart=new Date(n);weekStart.setDate(weekStart.getDate()-weekStart.getDay()+1);const weekEnd=new Date(weekStart);weekEnd.setDate(weekEnd.getDate()+6);return days.filter(d=>{const dd=new Date(d);return dd>=weekStart&&dd<=weekEnd}).length}

function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();reader.onload=e=>{
    try{const d=JSON.parse(e.target.result);
    if(d.done||d.profile)set({done:d.done||st.done,skillLv:d.skillLv||st.skillLv,holdLogs:d.holdLogs||st.holdLogs,repLogs:d.repLogs||st.repLogs,weekLog:d.weekLog||st.weekLog,bw:d.bw||st.bw,notes:d.notes||st.notes,profile:d.profile||st.profile,customEx:d.customEx||st.customEx,nutrition:d.nutrition||st.nutrition,sleep:d.sleep||st.sleep,measures:d.measures||st.measures,photos:d.photos||st.photos});
    alert('Backup erfolgreich geladen!')}catch{alert('Fehler beim Laden!')}};
  reader.readAsText(file);
}

function rLibrary(){
  const q=(st.libSearch||'').toLowerCase();
  const cat=st.libCat||'';
  let filtered=EXERCISES;
  if(q)filtered=filtered.filter(e=>e.name.toLowerCase().includes(q)||e.muscles.some(m=>m.toLowerCase().includes(q))||e.cat.toLowerCase().includes(q));
  if(cat)filtered=filtered.filter(e=>e.cat===cat);

  let chips=`<div class="filter-chip ${cat===''?'on':''}" onclick="set({libCat:''})">Alle</div>`;
  CATS.forEach(c=>{chips+=`<div class="filter-chip ${cat===c?'on':''}" onclick="set({libCat:'${c}'})">${c}</div>`});

  let cards='';
  if(st.libDetail!==undefined&&st.libDetail!==null){
    const ex=EXERCISES[st.libDetail];
    if(ex){
      let steps='';ex.steps.forEach((s,i)=>{steps+=`<div class="lib-detail-row"><div class="lib-detail-num">${i+1}</div><div class="lib-detail-text">${s}</div></div>`});
      let mtags='';ex.muscles.forEach(m=>{mtags+=`<span class="muscle-tag">${m}</span>`});
      cards=`<button class="back" onclick="set({libDetail:null})">${ICO.back} Zurück</button>
        <div class="lib-detail">
          <div class="lib-detail-title">${ex.name}</div>
          <div style="display:flex;gap:6px;align-items:center;margin-bottom:12px"><span class="ex-skill-tag">${ex.cat}</span><span style="font-size:10px;color:var(--text-tertiary)">${ex.equip}</span></div>
          <div class="lib-muscles" style="margin-bottom:14px">${mtags}</div>
          ${anatomySVG(ex.muscles)}
          <div style="font-size:12px;font-weight:700;margin-bottom:10px;margin-top:16px">Ausführung:</div>
          ${steps}
        </div>`;
    }
  }else{
    filtered.forEach((ex,i)=>{
      const gi=EXERCISES.indexOf(ex);
      let mtags='';ex.muscles.slice(0,3).forEach(m=>{mtags+=`<span class="muscle-tag">${m}</span>`});
      cards+=`<div class="lib-card" onclick="set({libDetail:${gi}})">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div><div style="font-size:13px;font-weight:700">${ex.name}</div><div style="font-size:10px;color:var(--text-tertiary);margin-top:2px">${ex.cat} · ${ex.equip}</div><div class="lib-muscles">${mtags}</div></div>
          <div class="chevron">›</div>
        </div>
      </div>`;
    });
    if(filtered.length===0)cards='<div class="empty">Keine Übungen gefunden</div>';
  }

  return`<div class="page"><div class="header"><div class="logo">ÜBUNGEN</div><div class="logo-sub">${EXERCISES.length} Übungen · Durchsuchbar</div></div>
  <div class="body">
    <div class="search-wrap"><input placeholder="Suche nach Übung oder Muskel..." value="${st.libSearch||''}" oninput="st.libSearch=this.value;render()"></div>
    <div class="filter-row">${chips}</div>
    ${cards}
  </div></div>`;
}

// Dashboard helper: recommend today's workout
function recommendedDay(){
  const allDays=Object.values(st.weekLog).flat();
  const todayDone=allDays.includes(td());
  if(todayDone)return null;
  // Find which days were done this week
  const now=new Date();const dow=now.getDay()||7;
  const monDate=new Date(now);monDate.setDate(now.getDate()-(dow-1));
  const weekStart=monDate.toISOString().slice(0,10);
  const thisWeek=allDays.filter(d=>d>=weekStart);
  // Recommend next day in sequence
  return DAYS[Math.min(thisWeek.length,DAYS.length-1)];
}

let _faTimer=null;
function buildFAQueue(dk){const d=PLAN[dk];if(!d)return[];const q=[];d.sections.forEach(sec=>{sec.exercises.forEach(ex=>{for(let s=0;s<ex.sets;s++){q.push({name:ex.name,set:s+1,totalSets:ex.sets,reps:ex.reps,rest:ex.rest,type:'work'});if(s<ex.sets-1)q.push({name:'Pause',rest:ex.rest,type:'rest'})}})});return q}
function startFA(dk){const q=buildFAQueue(dk);if(!q.length)return;set({fa:{queue:q,idx:0,timeLeft:0,running:false,day:dk}})}
function faNext(){if(!st.fa)return;const next=st.fa.idx+1;if(next>=st.fa.queue.length){clearInterval(_faTimer);confetti();const mk=td().slice(0,7);const w={...st.weekLog};const e=w[mk]||[];if(!e.includes(td()))w[mk]=[...e,td()];set({fa:null,weekLog:w,view:'home'});return}const item=st.fa.queue[next];clearInterval(_faTimer);if(item.type==='rest'){st.fa.idx=next;st.fa.timeLeft=item.rest;st.fa.running=true;_faTimer=setInterval(()=>{st.fa.timeLeft--;if(st.fa.timeLeft<=0){clearInterval(_faTimer);st.fa.running=false;try{navigator.vibrate&&navigator.vibrate([200,100,200])}catch{};faNext()}render()},1000);render()}else{set({fa:{...st.fa,idx:next,timeLeft:0,running:false}})}}
function faSkip(){if(!st.fa)return;clearInterval(_faTimer);faNext()}
function faStop(){clearInterval(_faTimer);set({fa:null})}
function rFA(){if(!st.fa)return'';const fa=st.fa,item=fa.queue[fa.idx];const total=fa.queue.filter(q=>q.type==='work').length;const cur=fa.queue.slice(0,fa.idx+1).filter(q=>q.type==='work').length;const pct=Math.round(cur/total*100);let nxt=null;for(let i=fa.idx+1;i<fa.queue.length;i++){if(fa.queue[i].type==='work'){nxt=fa.queue[i];break}}

function weeklySummary(){
  const allDays=Object.values(st.weekLog).flat();
  const now=new Date();const dow=now.getDay()||7;
  const monDate=new Date(now);monDate.setDate(now.getDate()-(dow-1));
  const weekStart=monDate.toISOString().slice(0,10);
  const trainDays=allDays.filter(d=>d>=weekStart).length;
  const streak=getStreak(st);
  
  // Nutrition this week avg
  const nutDays=Object.entries(st.nutrition).filter(([d])=>d>=weekStart);
  const avgCal=nutDays.length?Math.round(nutDays.reduce((a,[,v])=>a+v.cal,0)/nutDays.length):0;
  const avgProt=nutDays.length?Math.round(nutDays.reduce((a,[,v])=>a+v.protein,0)/nutDays.length):0;
  
  // Sleep avg
  const sleepDays=Object.entries(st.sleep).filter(([d])=>d>=weekStart);
  const avgSleep=sleepDays.length?(sleepDays.reduce((a,[,v])=>a+v.hours,0)/sleepDays.length).toFixed(1):0;
  
  // Logs this week
  const weekHolds=Object.values(st.holdLogs).flat().filter(l=>l.date>=weekStart).length;
  const weekReps=Object.values(st.repLogs).flat().filter(l=>l.date>=weekStart).length;

  return`<div class="modal-overlay" onclick="set({showSummary:false})"><div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">📋 Wöchentliche Zusammenfassung</div>
    <div class="summary-row"><span style="font-size:12px">🏋️ Trainings</span><span class="summary-val">${trainDays}</span></div>
    <div class="summary-row"><span style="font-size:12px">🔥 Streak</span><span class="summary-val">${streak} Tage</span></div>
    <div class="summary-row"><span style="font-size:12px">🍽 ∅ Kalorien</span><span class="summary-val">${avgCal}</span></div>
    <div class="summary-row"><span style="font-size:12px">🥩 ∅ Protein</span><span class="summary-val">${avgProt}g</span></div>
    <div class="summary-row"><span style="font-size:12px">😴 ∅ Schlaf</span><span class="summary-val">${avgSleep}h</span></div>
    <div class="summary-row"><span style="font-size:12px">📝 Skill-Logs</span><span class="summary-val">${weekHolds+weekReps}</span></div>
    <button class="btn btn-primary btn-full" onclick="set({showSummary:false})">Schließen</button>
  </div></div>`;
}

function ring(pct,sz=48){const r=(sz-6)/2,c=2*Math.PI*r,off=c-(pct/100)*c;const co=pct===100?'var(--success)':'';return`<div class="ring-wrap" style="width:${sz}px;height:${sz}px"><svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}"><circle class="ring-bg" cx="${sz/2}" cy="${sz/2}" r="${r}"/><circle class="ring-fill" cx="${sz/2}" cy="${sz/2}" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${off}" ${co?`style="stroke:${co}"`:''}"/></svg><div class="ring-text ${pct===100?'done':''}">${pct}%</div></div>`}

function heatmap(){const all=new Set(Object.values(st.weekLog).flat());const now=new Date();const start=new Date(now);start.setDate(start.getDate()-48);while(start.getDay()!==1)start.setDate(start.getDate()-1);let d=new Date(start);let cells='';while(d<=now||cells.split('hm-cell').length%8!==1){const ds=d.toISOString().slice(0,10);const isT=ds===td();const isFut=d>now;const tr=all.has(ds);let cls='hm-cell';if(isFut)cls+=' future';else if(tr)cls+=' l2';if(isT)cls+=' today';cells+=`<div class="${cls}"></div>`;d.setDate(d.getDate()+1)}
return`<div class="heatmap">${['Mo','Di','Mi','Do','Fr','Sa','So'].map(l=>`<div class="hm-label">${l}</div>`).join('')}${cells}</div>`}

function sparkline(logs,maxItems=10){if(!logs||logs.length<2)return'';const sl=logs.slice(-maxItems);const mx=Math.max(...sl.map(l=>l.val));return`<div class="sparkline">${sl.map(l=>`<div class="spark-bar" style="height:${Math.max((l.val/mx)*100,5)}%"></div>`).join('')}</div>`}

function weekCompare(){
  const thisW=wkc();
  // Previous week count
  const allDays=Object.values(st.weekLog).flat().sort();
  const now=new Date();const lastMon=new Date(now);lastMon.setDate(lastMon.getDate()-lastMon.getDay()-6);
  const lastSun=new Date(lastMon);lastSun.setDate(lastSun.getDate()+6);
  const lastW=allDays.filter(d=>{const dd=new Date(d);return dd>=lastMon&&dd<=lastSun}).length;
  const diff=thisW-lastW;const diffCls=diff>0?'up':diff<0?'down':'same';const diffTxt=diff>0?`+${diff}`:diff<0?`${diff}`:'±0';

}

function rWorkout(){

      let body='';if(isE){let circles='';for(let i=0;i<c.sets;i++){const dn=!!st.done[`${td()}-${st.selDay}-custom-${ci}-${i}`];circles+=`<div class="set ${dn?'done':''}" onclick="event.stopPropagation();try{navigator.vibrate&&navigator.vibrate(30)}catch{};const k='${td()}-${st.selDay}-custom-${ci}-${i}';const d={...st.done};d[k]=!d[k];set({done:d})"><span>${i+1}</span></div>`}

  let addBtn=`<button class="btn btn-ghost btn-full" style="margin-top:8px;border-style:dashed" onclick="set({showModal:true,modalDay:'${st.selDay}',newEx:{name:'',sets:3,reps:'8-10',rest:90,note:''}})">+ Eigene Übung hinzufügen</button>`;

  let cooldown=`<div class="drawer" style="margin-top:16px"><div class="drawer-header" onclick="set({showCooldown:!st.showCooldown})"><div style="display:flex;align-items:center;gap:8px"><span>🧊</span><span style="font-size:13px;font-weight:700">Cool-Down</span><span style="font-size:10px;color:var(--text-tertiary)">(~7 Min)</span></div><div class="chevron ${st.showCooldown?'open':''}">▾</div></div>${st.showCooldown?`<div class="drawer-body expand">${COOLDOWN.map(w=>`<div class="warmup-item"><div class="warmup-dot" style="background:var(--accent2)"></div><div style="flex:1"><div style="font-size:12px;font-weight:600">${w.name}</div><div style="font-size:10px;color:var(--text-tertiary)">${w.desc}</div></div><div style="font-size:11px;font-weight:700;color:var(--accent2)">${w.dur}</div></div>`).join('')}</div>`:''}</div>`;

  const nKey=td()+'-'+st.selDay;

  let fin='';if(p===100)fin=`<button class="btn btn-primary btn-full" onclick="confetti();try{navigator.vibrate&&navigator.vibrate([100,50,100])}catch{};const mk=td().slice(0,7);const w={...st.weekLog};const e=w[mk]||[];if(!e.includes(td()))w[mk]=[...e,td()];setTimeout(()=>set({weekLog:w,view:'home'}),800)">✅ Training abschließen</button>`;
  let faBtn=`<button class="btn btn-ghost btn-full" style="margin-top:8px;border-color:rgba(0,229,160,0.15)" onclick="startFA('${st.selDay}')">▶️ Follow-Along Modus starten</button>`;

  return`<div class="page"><div class="header"><button class="back" onclick="set({view:'home',expEx:null,showWarmup:false,showCooldown:false})">${ICO.back} Zurück</button><div style="display:flex;align-items:center;gap:16px">${ring(p,56)}<div><div style="font-size:20px;font-weight:800">${d.emoji} ${d.name}</div><div style="font-size:12px;color:var(--text-secondary);margin-top:2px">${p===100?'Abgeschlossen!':'In Bearbeitung...'}</div></div></div><button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="startFA('${st.selDay}')">▶ Follow-Along starten</button></div><div class="body">${warmup}${secs}${cxHtml}${addBtn}${cooldown}${noteH}${fin}</div></div>`}

function rProfile(){
  const p=st.profile;const fields=[['height','Größe'],['weight','Gewicht'],['age','Alter'],['goal','Ziel'],['level','Level'],['frequency','Frequenz'],['duration','Dauer'],['focus','Fokus'],['equipment','Equipment'],['nutrition','Ernährung'],['injuries','Verletzungen'],['split','Split']];
  let rows='';if(st.profileEdit){fields.forEach(([k,l])=>{rows+=`<div style="margin-bottom:14px"><div style="font-size:11px;color:var(--text-tertiary);margin-bottom:6px;font-weight:600">${l}</div><input class="input" value="${p[k]}" oninput="st.profile={...st.profile,${k}:this.value}"></div>`});rows+=`<button class="btn btn-primary btn-full" onclick="SV('profile',st.profile);set({profileEdit:false})">Speichern</button>`}
  else{fields.forEach(([k,l])=>{rows+=`<div class="profile-row"><span class="profile-label">${l}</span><span class="profile-value">${p[k]}</span></div>`})}
  let metrics='';const hm=p.height.match(/(\d+)/),wm=p.weight.match(/(\d+)/);
  if(hm&&wm){const hc=parseInt(hm[1])+2.5,wkg=parseInt(wm[1])+2.5;const bmi=(wkg/((hc/100)**2)).toFixed(1);const age=parseInt((p.age.match(/(\d+)/)||[0,30])[1]);const bmr=Math.round(10*wkg+6.25*hc-5*age+5),tdee=Math.round(bmr*1.725),sur=Math.round(tdee+300);
    metrics=`<div class="stat anim anim-2" style="display:flex;gap:20px"><div style="flex:1;text-align:center;padding:8px 0"><div class="metric-big">${bmi}</div><div class="metric-unit">BMI</div></div><div style="width:1px;background:var(--border)"></div><div style="flex:1;text-align:center;padding:8px 0"><div class="metric-big">${sur}</div><div class="metric-unit">kcal Aufbau</div></div></div>
    <div class="stat anim anim-3"><div class="stat-row"><span class="profile-label">BMR</span><span class="profile-value">${bmr} kcal</span></div><div class="stat-row"><span class="profile-label">TDEE</span><span class="profile-value">${tdee} kcal</span></div><div class="stat-row"><span class="profile-label">Aufbau</span><span class="profile-value" style="color:var(--accent)">${sur} kcal</span></div></div>`}

  return`<div class="page"><div class="header"><div style="display:flex;justify-content:space-between;align-items:flex-end"><div><div class="logo">PROFIL</div><div class="logo-sub">Persönliche Daten</div></div><button class="btn btn-ghost" onclick="set({profileEdit:!st.profileEdit})">${st.profileEdit?'✕':'✏️ Bearbeiten'}</button></div></div><div class="body">
    <div class="stat anim anim-1"><div class="stat-title" style="margin-bottom:14px">👤 Info</div>${rows}</div>${metrics}
    <div class="stat anim anim-4"><div class="stat-title" style="margin-bottom:10px">💾 Backup</div>
      <div style="display:flex;gap:8px"><button class="btn btn-primary" onclick="exportData()">📤 Export</button><label class="btn btn-ghost" style="cursor:pointer">📥 Import<input type="file" accept=".json" style="display:none" onchange="importData(this)"></label></div>
      <div style="font-size:10px;color:var(--text-tertiary);margin-top:8px;line-height:1.4">Export speichert alle Daten als JSON. Import lädt ein Backup.</div></div>
    <div class="stat anim anim-5"><div class="stat-title" style="margin-bottom:10px">🔥 Strategie</div><div style="font-size:12px;color:var(--text-secondary);line-height:1.7">4 Skill-Tage, Fokus Rücken & Schultern. Parallettes, Bänder & Weste integriert.</div></div>
  </div></div>`}

render();
</script>
</body>
</html>
