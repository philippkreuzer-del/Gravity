@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.05); } }

.body-content { padding: 0 20px; }
.section-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.12em; color: var(--dm); margin-bottom: 10px; margin-top: 20px; }

.card { background: var(--card); border: 1px solid var(--brd); border-radius: 14px; padding: 16px 18px; margin-bottom: 10px; cursor: pointer; position: relative; overflow: hidden; transition: all 0.2s; }
.card.skill { background: linear-gradient(135deg, rgba(0,212,170,0.03), rgba(0,153,255,0.02)); border-color: rgba(0,212,170,0.15); }
.card-title { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
.card-meta { font-size: 11px; color: var(--dm); }
.card-progress { position: absolute; bottom: 0; left: 0; height: 2px; background: linear-gradient(90deg, var(--a1), var(--a2)); transition: width 0.4s; }
.skill-badge { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--a1); background: rgba(0,212,170,0.08); border-radius: 5px; padding: 2px 7px; display: inline-block; margin-top: 6px; }

.level-dot.current { border: 2px solid var(--a1); background: rgba(0,212,170,0.08); color: var(--a1); }

.nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: rgba(6,8,12,0.95); border-top: 1px solid var(--brd); display: flex; justify-content: space-around; padding: 10px 0 18px; padding-bottom: max(18px, env(safe-area-inset-bottom)); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); z-index: 90; }

.hidden { display: none !important; }
.chevron { font-size: 16px; color: var(--dm); transition: transform 0.2s; }

function load(k, d) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } }
function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

function setState(patch) {

  if ('skillLevels' in patch) save("g-skills", state.skillLevels);
  if ('holdLogs' in patch) save("g-holds", state.holdLogs);

function dayProg(dk) {
  const d = WORKOUT_PLAN[dk]; let t=0, dn=0;
  d.sections.forEach((s,si) => s.exercises.forEach((e,ei) => { for(let i=0;i<e.sets;i++) { t++; if(state.done[sKey(dk,si,ei,i)]) dn++; }}));
  return t>0 ? Math.round((dn/t)*100) : 0;
}

function wkCt() { return (state.weekLog[today().slice(0,7)] || []).length; }

// ─── TIMERS ───
let timerInterval = null;
let swInterval = null;

function startRestTimer(seconds) {
  clearInterval(timerInterval);
  setState({ timer: seconds, timerLeft: seconds });
  timerInterval = setInterval(() => {
    state.timerLeft--;
    if (state.timerLeft <= 0) { clearInterval(timerInterval); state.timer = null; state.timerLeft = 0; }
    render();
  }, 1000);
}

function stopRestTimer() { clearInterval(timerInterval); setState({ timer: null, timerLeft: 0 }); }

function toggleStopwatch(skillKey) {
  if (state.stopwatch) {
    clearInterval(swInterval);
    if (state.swTime > 0 && skillKey) {
      const logs = { ...state.holdLogs };
      logs[skillKey] = [...(logs[skillKey]||[]), { val: state.swTime, date: today() }];
      setState({ stopwatch: false, swTime: 0, holdLogs: logs });
    } else {
      setState({ stopwatch: false, swTime: 0 });
    }
  } else {
    setState({ stopwatch: true, swTime: 0 });
    swInterval = setInterval(() => { state.swTime++; render(); }, 1000);
  }
}

function stopStopwatch() { clearInterval(swInterval); setState({ stopwatch: false, swTime: 0 }); }

// ─── RENDER ───
function render() {
  const app = document.getElementById('app');
  let html = '';

  if (state.view === 'home') html = renderHome();
  else if (state.view === 'workout') html = renderWorkout();
  else if (state.view === 'skills') html = renderSkills();
  else if (state.view === 'stats') html = renderStats();
  else if (state.view === 'profile') html = renderProfile();

  if (state.timer) {
    html += `<div class="timer-bar rest"><div class="timer-time">${fmt(state.timerLeft)}</div><div class="timer-label">Pause</div><button class="timer-close" onclick="stopRestTimer()">✕</button></div>`;
  } else if (state.stopwatch) {
    html += `<div class="timer-bar hold"><div class="timer-time">${fmt(state.swTime)}</div><div class="timer-label">Hold</div><button class="timer-close" onclick="stopStopwatch()">⏹</button></div>`;
  }

  html += `<div class="nav">
    <div class="nav-item ${state.view==='home'?'active':''}" onclick="setState({view:'home',selDay:null,expandedEx:null})"><span>🏠</span><span>PLAN</span></div>
    <div class="nav-item ${state.view==='skills'?'active':''}" onclick="setState({view:'skills',selSkill:null,expandedEx:null})"><span>🎯</span><span>SKILLS</span></div>
    <div class="nav-item ${state.view==='stats'?'active':''}" onclick="setState({view:'stats',expandedEx:null})"><span>📊</span><span>STATS</span></div>
    <div class="nav-item ${state.view==='profile'?'active':''}" onclick="setState({view:'profile',expandedEx:null})"><span>👤</span><span>PROFIL</span></div>
  </div>`;

  app.innerHTML = html;
}

function renderHome() {
  let cards = '';
  DAYS.forEach(dk => {
    const d = WORKOUT_PLAN[dk]; const p = dayProg(dk);
    const totalEx = d.sections.reduce((a,s) => a + s.exercises.length, 0);
    cards += `<div class="card ${d.type==='skill'?'skill':''} fade-up" onclick="setState({view:'workout',selDay:'${dk}',expandedEx:null})" style="animation-delay:${DAYS.indexOf(dk)*0.06}s">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="card-title">${d.emoji} ${d.name}</div>
          <div class="card-meta">${totalEx} Übungen · ~90 Min</div>
          ${d.type==='skill' ? '<div class="skill-badge">Skill-Tag</div>' : ''}
        </div>
        ${p > 0 ? `<div style="font-size:18px;font-weight:800;color:${p===100?'var(--ok)':'var(--a1)'}">${p}%</div>` : ''}
      </div>
      <div class="card-progress" style="width:${p}%"></div>
    </div>`;
  });

  return `<div class="header">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div class="logo">GRAVITY</div>
      <div class="badge">${wkCt()}/5 diese Woche</div>
    </div>
    <div style="font-size:12px;color:var(--dm);margin-top:5px">Calisthenics Skill Progression</div>
  </div>
  <div class="body-content">
    <div class="section-label">Trainingsplan</div>
    ${cards}
  </div>`;
}

function renderWorkout() {
  if (!state.selDay) return '';
  const d = WORKOUT_PLAN[state.selDay]; const p = dayProg(state.selDay);
  let sections = '';

  d.sections.forEach((sec, si) => {
    let exs = '';
    sec.exercises.forEach((ex, ei) => {
      const allD = Array.from({length:ex.sets},(_,i) => !!state.done[sKey(state.selDay,si,ei,i)]).every(Boolean);
      const exK = `${si}-${ei}`;
      const isE = state.expandedEx === exK;
      const sk = ex.skill ? SKILLS[ex.skill] : null;
      const skLv = ex.skill ? state.skillLevels[ex.skill] : null;
      const skP = sk ? sk.progressions[skLv-1] : null;

      let expanded = '';
      if (isE) {
        let tips = '';
        if (ex.note) tips += `<div class="tip-box note">💡 ${ex.note}</div>`;
        if (skP?.tip) tips += `<div class="tip-box coach">🎓 ${skP.tip}</div>`;

        let circles = '';
        for (let i=0; i<ex.sets; i++) {
          const dn = !!state.done[sKey(state.selDay,si,ei,i)];
          circles += `<div class="set-circle ${dn?'done':''}" onclick="event.stopPropagation();const k=sKey('${state.selDay}',${si},${ei},${i});const d={...state.done};d[k]=!d[k];setState({done:d})">${i+1}</div>`;
        }

        let btns = `<button class="btn" onclick="event.stopPropagation();startRestTimer(${ex.rest})">⏱ ${ex.rest}s</button>`;
        if (sk && skP?.metric === 'hold') {
          btns += `<button class="btn" onclick="event.stopPropagation();toggleStopwatch('${ex.skill}')">${state.stopwatch ? '⏹ '+fmt(state.swTime)+' speichern' : '⏱ Stoppuhr'}</button>`;
        }
        if (sk) {
          btns += `<button class="btn" onclick="event.stopPropagation();setState({inputTarget:{type:'${skP?.metric}',skill:'${ex.skill}',name:'${ex.name.replace(/'/g,"\\'")}'},inputVal:''})">📝 ${skP?.metric==='hold'?'Hold':'Reps'}</button>`;
        }

        let inputHtml = '';
        if (state.inputTarget?.name === ex.name) {
          inputHtml = `<div style="margin-top:8px;display:flex;gap:6px">
            <input class="input" type="number" placeholder="${state.inputTarget.type==='hold'?'Sekunden':'Reps'}" value="${state.inputVal}" oninput="state.inputVal=this.value" onclick="event.stopPropagation()">
            <button class="btn primary" onclick="event.stopPropagation();if(!state.inputVal)return;const logs={...state.${state.inputTarget.type==='hold'?'holdLogs':'repLogs'}};logs['${state.inputTarget.skill}']=[...(logs['${state.inputTarget.skill}']||[]),{val:parseInt(state.inputVal),date:today()}];setState({${state.inputTarget.type==='hold'?'holdLogs':'repLogs'}:logs,inputVal:'',inputTarget:null})">💾</button>
          </div>`;
        }

        let logInfo = '';
        if (ex.skill && state.holdLogs[ex.skill]?.length > 0) {
          const last = state.holdLogs[ex.skill].slice(-1)[0];
          logInfo += `<div style="margin-top:8px;font-size:10px;color:var(--a1)">📊 Letzter Hold: ${last.val}s (${last.date})</div>`;
        }
        if (ex.skill && state.repLogs[ex.skill]?.length > 0) {
          const last = state.repLogs[ex.skill].slice(-1)[0];
          logInfo += `<div style="margin-top:4px;font-size:10px;color:var(--a2)">📊 Letzte Reps: ${last.val} (${last.date})</div>`;
        }

        expanded = `<div style="margin-top:12px">${tips}
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${circles}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">${btns}</div>
          ${inputHtml}${logInfo}
        </div>`;
      }

      exs += `<div class="ex-row ${allD?'done':''}">
        <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="setState({expandedEx:state.expandedEx==='${exK}'?null:'${exK}'})">
          <div style="flex:1">
            <div class="ex-name" style="${allD?'color:var(--ok)':''}">${allD?'✓ ':''}${ex.name}</div>
            <div class="ex-meta">${ex.sets}×${ex.reps} · ${ex.rest}s Pause</div>
            ${sk ? `<div class="ex-skill">Stufe ${skLv}: ${skP?.name}</div>` : ''}
          </div>
          <div class="chevron ${isE?'open':''}">▾</div>
        </div>
        ${expanded}
      </div>`;
    });

    sections += `<div class="section-label" style="margin-top:${si===0?'8':'24'}px">${sec.title}</div>${exs}`;
  });

  let finishBtn = '';
  if (p === 100) {
    finishBtn = `<button class="btn primary full" onclick="const mk=today().slice(0,7);const wl={...state.weekLog};const e=wl[mk]||[];if(!e.includes(today())){wl[mk]=[...e,today()];}setState({weekLog:wl,view:'home'})">✅ Training abschließen</button>`;
  }

  return `<div class="header">
    <button class="back-btn" onclick="setState({view:'home',expandedEx:null})">← Zurück</button>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:18px;font-weight:800">${d.emoji} ${d.name}</div>
      <div style="font-size:18px;font-weight:800;color:${p===100?'var(--ok)':'var(--a1)'}">${p}%</div>
    </div>
    <div style="margin-top:8px;height:4px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden">
      <div style="height:100%;width:${p}%;background:linear-gradient(90deg,var(--a1),var(--a2));border-radius:2px;transition:width 0.4s"></div>
    </div>
  </div>
  <div class="body-content">${sections}${finishBtn}</div>`;
}

function renderSkills() {
  if (state.selSkill) {
    const sk = SKILLS[state.selSkill]; const lv = state.skillLevels[state.selSkill];
    let dots = '';
    sk.progressions.forEach((pr, i) => {
      const cls = i+1 < lv ? 'done' : i+1 === lv ? 'current' : 'future';
      dots += `<div class="level-dot ${cls}">${i+1}</div>`;
      if (i < sk.progressions.length - 1) dots += `<div class="level-line ${i+1<lv?'done':''}"></div>`;
    });

    let progs = '';
    sk.progressions.forEach((pr, i) => {
      const isCur = i+1 === lv; const isD = i+1 < lv;
      let lvBtn = '';
      if (isCur) lvBtn = `<button class="btn primary" style="font-size:10px;padding:6px 10px" onclick="const sl={...state.skillLevels};sl['${state.selSkill}']=Math.min(${lv+1},${sk.progressions.length});setState({skillLevels:sl})">Level Up ↑</button>`;
      let logs = '';
      if (isCur && (state.holdLogs[state.selSkill]?.length>0 || state.repLogs[state.selSkill]?.length>0)) {
        let items = '';
        (state.holdLogs[state.selSkill]||[]).slice(-5).forEach(l => { items += `<div style="font-size:10px;color:var(--a1)">${l.date}: ${l.val}s Hold</div>`; });
        (state.repLogs[state.selSkill]||[]).slice(-5).forEach(l => { items += `<div style="font-size:10px;color:var(--a2)">${l.date}: ${l.val} Reps</div>`; });
        logs = `<div style="margin-top:10px;border-top:1px solid var(--brd);padding-top:8px"><div style="font-size:10px;font-weight:700;color:var(--dm);margin-bottom:4px">Letzte Logs:</div>${items}</div>`;
      }
      progs += `<div class="ex-row ${isD?'done':''}" style="opacity:${i+1>lv+1?'0.4':'1'}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div style="font-size:13px;font-weight:700;color:${isD?'var(--ok)':isCur?'var(--a1)':'var(--dm)'}">${isD?'✓ ':isCur?'→ ':''}${pr.name}</div>
            <div style="font-size:11px;color:var(--dm);margin-top:2px">${pr.desc}</div>
            <div style="font-size:10px;color:${isCur?'var(--a1)':'var(--dm)'};margin-top:3px">Ziel: ${pr.target}</div>
            ${pr.tip && isCur ? `<div class="tip-box coach" style="margin-top:4px">🎓 ${pr.tip}</div>` : ''}
          </div>
          ${lvBtn}
        </div>
        ${logs}
      </div>`;
    });

    return `<div class="header">
      <button class="back-btn" onclick="setState({selSkill:null})">← Alle Skills</button>
      <div style="font-size:18px;font-weight:800;margin-bottom:6px">${sk.icon} ${sk.name}</div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:20px">${dots}</div>
    </div>
    <div class="body-content">${progs}</div>`;
  }

  let cards = '';
  Object.entries(SKILLS).forEach(([key, sk]) => {
    const lv = state.skillLevels[key]; const mx = sk.progressions.length; const pr = sk.progressions[lv-1];
    cards += `<div class="card fade-up" onclick="setState({selSkill:'${key}'})">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:14px;font-weight:700">${sk.icon} ${sk.name}</div>
          <div style="font-size:11px;color:var(--a1);margin-top:2px">Stufe ${lv}: ${pr?.name}</div>
          <div style="font-size:10px;color:var(--dm);margin-top:2px">Ziel: ${pr?.target}</div>
        </div>
        <div style="font-size:18px;font-weight:800;color:var(--a1)">${lv}<span style="font-size:11px;color:var(--dm)">/${mx}</span></div>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${(lv/mx)*100}%"></div></div>
    </div>`;
  });

  return `<div class="header">
    <div class="logo">Skill-Baum</div>
    <div style="font-size:12px;color:var(--dm);margin-top:5px">Deine Progressionen</div>
  </div>
  <div class="body-content">${cards}</div>`;
}

function renderStats() {
  // BW chart
  let bwChart = '<div style="font-size:11px;color:var(--dm);text-align:center;padding:16px">Noch keine Einträge</div>';
  if (state.bodyWeight.length > 0) {
    const slice = state.bodyWeight.slice(-14);
    const vals = slice.map(x => x.value);
    const mn = Math.min(...vals) - 2, mx = Math.max(...vals) + 2;
    let bars = '';
    slice.forEach(w => {
      const pct = mx===mn ? 50 : ((w.value-mn)/(mx-mn))*100;
      bars += `<div class="bw-bar"><div class="bw-bar-val">${w.value}</div><div class="bw-bar-fill" style="height:${Math.max(pct,8)}%"></div></div>`;
    });
    bwChart = `<div style="display:flex;align-items:flex-end;gap:3px;height:70px">${bars}</div>`;
  }

  let bwInput = '';
  if (state.showBwInput) {
    bwInput = `<div style="display:flex;gap:6px;margin-bottom:12px">
      <input class="input" type="number" placeholder="kg" value="${state.bwInput}" oninput="state.bwInput=this.value">
      <button class="btn primary" onclick="if(!state.bwInput)return;setState({bodyWeight:[...state.bodyWeight,{value:parseFloat(state.bwInput),date:today()}],bwInput:'',showBwInput:false})">💾</button>
    </div>`;
  }

  // Hold PRs
  let holds = '<div style="font-size:11px;color:var(--dm);text-align:center;padding:16px">Noch keine Holds</div>';
  if (Object.keys(state.holdLogs).length > 0) {
    holds = '';
    Object.entries(state.holdLogs).forEach(([key,logs]) => {
      const best = Math.max(...logs.map(l=>l.val)); const sk = SKILLS[key];
      holds += `<div class="stat-row"><div style="font-size:12px;font-weight:600">${sk?.icon} ${sk?.name}</div><div style="font-size:11px;color:var(--a1);margin-top:2px">Best: ${best}s · ${logs.length} Logs</div></div>`;
    });
  }

  // Rep PRs
  let reps = '<div style="font-size:11px;color:var(--dm);text-align:center;padding:16px">Noch keine Reps</div>';
  if (Object.keys(state.repLogs).length > 0) {
    reps = '';
    Object.entries(state.repLogs).forEach(([key,logs]) => {
      const best = Math.max(...logs.map(l=>l.val)); const sk = SKILLS[key];
      reps += `<div class="stat-row"><div style="font-size:12px;font-weight:600">${sk?.icon} ${sk?.name}</div><div style="font-size:11px;color:var(--a2);margin-top:2px">Best: ${best} Reps · ${logs.length} Logs</div></div>`;
    });
  }

  // Frequency
  let freq = '<div style="font-size:11px;color:var(--dm);text-align:center;padding:16px">Noch keine Logs</div>';
  const wkEntries = Object.entries(state.weekLog).sort().reverse().slice(0,4);
  if (wkEntries.length > 0) {
    freq = '';
    wkEntries.forEach(([m,days]) => {
      freq += `<div class="stat-row"><div style="font-size:12px;font-weight:600">${m}</div><div style="font-size:11px;color:var(--a1);margin-top:2px">${days.length} Trainingstage</div></div>`;
    });
  }

  return `<div class="header">
    <div class="logo">Statistiken</div>
    <div style="font-size:12px;color:var(--dm);margin-top:5px">Fortschritt & Tracking</div>
  </div>
  <div class="body-content">
    <div class="stat-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:13px;font-weight:700">📊 Körpergewicht</div>
        <button class="btn" onclick="setState({showBwInput:!state.showBwInput})">+ Eintrag</button>
      </div>
      ${bwInput}${bwChart}
    </div>
    <div class="stat-card"><div style="font-size:13px;font-weight:700;margin-bottom:12px">⏱ Beste Haltezeiten</div>${holds}</div>
    <div class="stat-card"><div style="font-size:13px;font-weight:700;margin-bottom:12px">💪 Beste Reps</div>${reps}</div>
    <div class="stat-card"><div style="font-size:13px;font-weight:700;margin-bottom:12px">📅 Trainingsfrequenz</div>${freq}</div>
    <button class="btn danger full" onclick="if(confirm('Alle Daten wirklich löschen?')){setState({done:{},skillLevels:Object.fromEntries(Object.entries(SKILLS).map(([k,v])=>[k,v.current])),holdLogs:{},repLogs:{},weekLog:{},bodyWeight:[]})}">🗑 Alle Daten zurücksetzen</button>
  </div>`;
}

function renderProfile() {
  const p = state.profileData;
  const editable = [
    ['height','Größe'], ['weight','Gewicht'], ['age','Alter'], ['goal','Ziel'], ['level','Level'],
    ['frequency','Frequenz'], ['duration','Dauer'], ['focus','Fokus'], ['equipment','Equipment'],
    ['nutrition','Ernährungs-Tracking'], ['injuries','Verletzungen'], ['split','Split-Typ']
  ];

  let rows = '';
  if (state.profileEdit) {
    editable.forEach(([k,label]) => {
      rows += `<div style="margin-bottom:12px">
        <div style="font-size:11px;color:var(--dm);margin-bottom:4px">${label}</div>
        <input class="input" value="${p[k]}" oninput="state.profileData={...state.profileData,${k}:this.value}">
      </div>`;
    });
    rows += `<button class="btn primary" style="width:100%;padding:12px" onclick="save('g-profile',state.profileData);setState({profileEdit:false})">💾 Speichern</button>`;
  } else {
    editable.forEach(([k,label]) => {
      rows += `<div class="profile-row"><span class="profile-label">${label}</span><span class="profile-value">${p[k]}</span></div>`;
    });
  }

  // BMI
  let bmiSection = '';
  const heightMatch = p.height.match(/(\d+)/);
  const weightMatch = p.weight.match(/(\d+)/);
  if (heightMatch && weightMatch) {
    const hCm = parseInt(heightMatch[1]) + 2.5; // midpoint
    const wKg = parseInt(weightMatch[1]) + 2.5;
    const bmi = (wKg / ((hCm/100)**2)).toFixed(1);
    let bmiColor = 'var(--a1)';
    let bmiLabel = 'Normalgewicht';
    if (bmi < 18.5) { bmiColor = 'var(--w)'; bmiLabel = 'Untergewicht'; }
    else if (bmi >= 25) { bmiColor = 'var(--w)'; bmiLabel = 'Übergewicht'; }
    bmiSection = `<div class="stat-card">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">📐 BMI (geschätzt)</div>
      <div style="font-size:28px;font-weight:800;color:${bmiColor}">${bmi}</div>
      <div style="font-size:11px;color:var(--dm);margin-top:2px">${bmiLabel} · Hinweis: BMI ignoriert Muskelmasse</div>
    </div>`;
  }

  // Calorie estimate
  let calSection = '';
  if (heightMatch && weightMatch) {
    const wKg = parseInt(weightMatch[1]) + 2.5;
    const ageVal = parseInt(p.age.match(/(\d+)/)?.[1] || 30);
    const hCm = parseInt(heightMatch[1]) + 2.5;
    const bmr = Math.round(10 * wKg + 6.25 * hCm - 5 * ageVal + 5); // Mifflin-St Jeor (male)
    const tdee = Math.round(bmr * 1.725); // very active
    const surplus = Math.round(tdee + 300);
    calSection = `<div class="stat-card">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">🔥 Kalorien-Schätzung</div>
      <div class="profile-row"><span class="profile-label">Grundumsatz (BMR)</span><span class="profile-value">${bmr} kcal</span></div>
      <div class="profile-row"><span class="profile-label">TDEE (sehr aktiv)</span><span class="profile-value">${tdee} kcal</span></div>
      <div class="profile-row"><span class="profile-label">Aufbau (+300)</span><span class="profile-value" style="color:var(--a1)">${surplus} kcal</span></div>
      <div style="font-size:10px;color:var(--dm);margin-top:8px">Schätzung nach Mifflin-St Jeor. Für genaue Werte Ernährungsberater konsultieren.</div>
    </div>`;
  }

  return `<div class="header">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="logo">Profil</div>
      <button class="btn" onclick="setState({profileEdit:!state.profileEdit})">${state.profileEdit ? '✕ Abbrechen' : '✏️ Bearbeiten'}</button>
    </div>
    <div style="font-size:12px;color:var(--dm);margin-top:5px">Deine persönlichen Daten</div>
  </div>
  <div class="body-content">
    <div class="stat-card">
      <div style="font-size:14px;font-weight:700;margin-bottom:16px">👤 Trainingsinfo</div>
